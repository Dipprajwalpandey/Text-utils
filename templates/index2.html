<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
    <title>TextUtils</title>
</head>
<body>
<h1>Welcome to the text analyzer. Enter your text below</h1>
<form action='/analyze' method='get'>
      <textarea name='text' style="margin: 10px 0px; width: 728px; height: 244px;"></textarea><br>

    <input type="checkbox" name="removepunctuation"> Remove Punctuations<br>
    <input type="checkbox" name="fullcaps"> UPPERCASE<br>
     <input type="checkbox" name="newlineremover"> New Line Remover<br>
     <input type="checkbox" name="extraspaceremover"> Extra Spaces Remover<br>
    <input type="checkbox" name="charcount"> Character Count<br>
    <button type="submit">Analyze Text</button>
</form>
</body>
</html>
